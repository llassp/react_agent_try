<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent ReAct Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #475569;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 指标卡 */
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #1e293b 0%, #252f47 100%);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
        }
        
        .metric-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 8px;
            color: #f8fafc;
        }
        
        .metric-card.tokens .metric-value { color: #60a5fa; }
        .metric-card.agents .metric-value { color: #34d399; }
        .metric-card.steps .metric-value { color: #fbbf24; }
        .metric-card.time .metric-value { color: #f472b6; }
        
        /* Agent 卡片 */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        
        .agent-header {
            padding: 15px 20px;
            background: #252f47;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .agent-id {
            font-weight: 600;
            color: #f8fafc;
        }
        
        .agent-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-idle { background: #475569; color: #cbd5e1; }
        .status-running { background: #3b82f6; color: white; }
        .status-done { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }
        
        .agent-body {
            padding: 20px;
        }
        
        .thinking-panel {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #8b5cf6;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .thinking-label {
            font-size: 11px;
            color: #8b5cf6;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .thinking-content {
            font-size: 13px;
            color: #a78bfa;
            line-height: 1.5;
            font-style: italic;
        }
        
        .steps-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .step-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #252f47;
            border-radius: 6px;
            font-size: 13px;
            border-left: 2px solid #475569;
        }
        
        .step-item.thought { border-left-color: #8b5cf6; }
        .step-item.action { border-left-color: #f59e0b; }
        .step-item.observation { border-left-color: #6b7280; }
        
        .step-type {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .step-content {
            color: #e2e8f0;
            line-height: 1.4;
        }
        
        .progress-bar {
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s ease;
        }
        
        /* Context Window */
        .context-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        
        .context-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .context-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .context-label {
            width: 80px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .context-bar-wrapper {
            flex: 1;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .context-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease, background-color 0.3s;
        }
        
        .context-bar.normal { background: #3b82f6; }
        .context-bar.warning { background: #f59e0b; }
        .context-bar.compressed { background: #10b981; animation: flash 0.5s; }
        
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .context-value {
            width: 60px;
            text-align: right;
            font-size: 13px;
            color: #e2e8f0;
        }
        
        /* Token Chart */
        .chart-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        #tokenChart {
            width: 100%;
            height: 100%;
        }
        
        /* Event Log */
        .log-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        
        .log-container {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 6px 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 15px;
        }
        
        .log-time {
            color: #64748b;
            white-space: nowrap;
        }
        
        .log-agent {
            color: #94a3b8;
            width: 70px;
            flex-shrink: 0;
        }
        
        .log-type {
            width: 80px;
            flex-shrink: 0;
        }
        
        .log-type.thinking { color: #a78bfa; }
        .log-type.action { color: #f59e0b; }
        .log-type.observation { color: #6b7280; }
        .log-type.token_update { color: #60a5fa; }
        .log-type.agent_done { color: #34d399; }
        .log-type.error { color: #ef4444; }
        
        .log-content {
            color: #e2e8f0;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Query Form */
        .query-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        
        .query-form {
            display: flex;
            gap: 15px;
        }
        
        .query-input {
            flex: 1;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }
        
        .query-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .query-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .query-btn:hover {
            opacity: 0.9;
        }
        
        .query-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Result Section */
        .result-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #334155;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-content {
            background: #0f172a;
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
            color: #e2e8f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Multi-Agent ReAct Dashboard</h1>
    </div>
    
    <div class="container">
        <!-- Query Form -->
        <div class="query-section">
            <div class="query-form">
                <input type="text" class="query-input" id="queryInput" 
                       placeholder="输入你的问题..." 
                       value="请计算 123 * 456，并搜索 Python 的相关信息">
                <button class="query-btn" id="queryBtn" onclick="submitQuery()">提交查询</button>
            </div>
        </div>
        
        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <h3 class="section-title">最终答案</h3>
            <div class="result-content" id="resultContent"></div>
        </div>
        
        <!-- Metrics -->
        <div class="metrics">
            <div class="metric-card tokens">
                <div class="metric-label">总 Token 消耗</div>
                <div class="metric-value" id="totalTokens">0</div>
            </div>
            <div class="metric-card agents">
                <div class="metric-label">活跃 Agent 数</div>
                <div class="metric-value" id="activeAgents">0</div>
            </div>
            <div class="metric-card steps">
                <div class="metric-label">累计推理步骤</div>
                <div class="metric-value" id="totalSteps">0</div>
            </div>
            <div class="metric-card time">
                <div class="metric-label">运行耗时</div>
                <div class="metric-value" id="elapsedTime">0s</div>
            </div>
        </div>
        
        <!-- Agent Cards -->
        <div class="agents-grid" id="agentsGrid">
            <!-- Agent cards will be generated by JS -->
        </div>
        
        <!-- Context Window Usage -->
        <div class="context-section">
            <h3 class="section-title">Context Window 使用率 (128k)</h3>
            <div class="context-bars" id="contextBars">
                <!-- Context bars will be generated by JS -->
            </div>
        </div>
        
        <!-- Token Chart -->
        <div class="chart-section">
            <h3 class="section-title">Token 消耗趋势</h3>
            <div class="chart-container">
                <canvas id="tokenChart"></canvas>
            </div>
        </div>
        
        <!-- Event Log -->
        <div class="log-section">
            <h3 class="section-title">事件日志</h3>
            <div class="log-container" id="logContainer">
                <!-- Logs will be appended by JS -->
            </div>
        </div>
    </div>
    
    <script>
        // 全局状态
        const state = {
            sessionId: null,
            agents: {},
            totalTokens: 0,
            totalSteps: 0,
            startTime: null,
            eventSource: null,
            tokenHistory: {
                'agent-0': [],
                'agent-1': [],
                'agent-2': []
            }
        };
        
        const agentColors = {
            'agent-0': '#8b5cf6',
            'agent-1': '#3b82f6',
            'agent-2': '#f59e0b'
        };
        
        // 初始化 Agent 卡片
        function initAgentCards() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 3; i++) {
                const agentId = `agent-${i}`;
                state.agents[agentId] = {
                    status: 'idle',
                    steps: [],
                    thinking: '',
                    tokens: 0,
                    progress: 0
                };
                
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.id = `agent-card-${i}`;
                card.innerHTML = `
                    <div class="agent-header">
                        <span class="agent-id">${agentId}</span>
                        <span class="agent-status status-idle" id="status-${agentId}">idle</span>
                    </div>
                    <div class="agent-body">
                        <div class="thinking-panel" id="thinking-${agentId}" style="display: none;">
                            <div class="thinking-label">Thinking</div>
                            <div class="thinking-content" id="thinking-content-${agentId}"></div>
                        </div>
                        <div class="steps-list" id="steps-${agentId}"></div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-${agentId}" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }
        
        // 初始化 Context Bars
        function initContextBars() {
            const container = document.getElementById('contextBars');
            container.innerHTML = '';
            
            for (let i = 0; i < 3; i++) {
                const agentId = `agent-${i}`;
                const item = document.createElement('div');
                item.className = 'context-item';
                item.innerHTML = `
                    <span class="context-label">${agentId}</span>
                    <div class="context-bar-wrapper">
                        <div class="context-bar normal" id="context-bar-${agentId}" style="width: 0%"></div>
                    </div>
                    <span class="context-value" id="context-value-${agentId}">0%</span>
                `;
                container.appendChild(item);
            }
        }
        
        // 提交查询
        async function submitQuery() {
            const queryInput = document.getElementById('queryInput');
            const queryBtn = document.getElementById('queryBtn');
            const query = queryInput.value.trim();
            
            if (!query) return;
            
            queryBtn.disabled = true;
            queryBtn.textContent = '处理中...';
            
            // 重置状态
            state.totalTokens = 0;
            state.totalSteps = 0;
            state.startTime = Date.now();
            state.tokenHistory = { 'agent-0': [], 'agent-1': [], 'agent-2': [] };
            
            initAgentCards();
            initContextBars();
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('resultSection').classList.remove('show');
            updateMetrics();
            
            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, num_agents: 3, max_iterations: 10 })
                });
                
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`HTTP ${response.status}: ${text}`);
                }
                
                const data = await response.json();
                state.sessionId = data.session_id;
                
                // 后端现在立刻返回 session_id，真正的 final_answer 会在
                // SSE 的 session_done 事件里到达；这里先清空结果区。
                document.getElementById('resultContent').textContent = '';
                document.getElementById('resultSection').classList.remove('show');
                
                // 连接 SSE
                connectSSE(data.session_id);
                
            } catch (error) {
                console.error('Error:', error);
                addLogEntry('system', 'error', `请求失败: ${error.message}`);
                queryBtn.disabled = false;
                queryBtn.textContent = '提交查询';
            }
            // 注意：按钮恢复由 session_done / error 事件负责，这里不再 finally 置回
        }
        
        // 连接 SSE
        function connectSSE(sessionId) {
            if (state.eventSource) {
                state.eventSource.close();
            }
            
            state.eventSource = new EventSource(`/sse/stream/${sessionId}`);
            
            // 服务端用 sse_starlette 发送的是"具名事件"（event: xxx\ndata: ...），
            // 按 W3C EventSource 规范这类消息不会走 onmessage，只会 dispatch 到
            // 对应事件类型的监听器。所以必须对每个已知事件类型都 addEventListener，
            // 否则 session_done / action / observation 等一个都收不到。
            const SSE_EVENT_TYPES = [
                'agent_start', 'thinking', 'thinking_delta', 'content_delta',
                'action', 'observation', 'token_update', 'context_compressed',
                'agent_done', 'session_done', 'error', 'heartbeat'
            ];
            const dispatch = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleEvent(data);
                } catch (e) {
                    console.error('SSE parse error:', e, event.data);
                }
            };
            SSE_EVENT_TYPES.forEach(et => {
                state.eventSource.addEventListener(et, dispatch);
            });
            // 兜底：如果后端未来改回默认 message 事件，也能收到
            state.eventSource.onmessage = dispatch;
            
            state.eventSource.onerror = (error) => {
                console.error('SSE Error:', error);
                // readyState=2 (CLOSED) 才真的关，其它情况 EventSource 会自动重连
                if (state.eventSource && state.eventSource.readyState === EventSource.CLOSED) {
                    state.eventSource.close();
                }
            };
        }
        
        // 处理事件
        function handleEvent(event) {
            const { event_type, agent_id, data, timestamp } = event;
            
            switch (event_type) {
                case 'agent_start':
                    updateAgentStatus(agent_id, 'running');
                    break;
                    
                case 'thinking':
                    updateThinking(agent_id, data.text);
                    break;
                    
                case 'action':
                    addStep(agent_id, 'action', `工具: ${data.tool}`, data.input);
                    state.totalSteps++;
                    updateMetrics();
                    break;
                    
                case 'observation':
                    addStep(agent_id, 'observation', data.observation);
                    break;
                    
                case 'token_update':
                    updateTokenUsage(agent_id, data.cumulative);
                    updateTokenChart(agent_id, data.iteration, data.cumulative);
                    break;
                    
                case 'context_compressed':
                    flashContextBar(agent_id);
                    break;
                    
                case 'agent_done':
                    updateAgentStatus(agent_id, 'done');
                    break;
                    
                case 'session_done':
                    if (data.total_tokens) {
                        state.totalTokens = data.total_tokens.total || 0;
                    }
                    updateMetrics();
                    // 展示最终答案（后端现在通过 SSE 推送而不是 POST 响应返回）
                    if (data.final_answer) {
                        document.getElementById('resultContent').textContent = data.final_answer;
                        document.getElementById('resultSection').classList.add('show');
                    }
                    {
                        const qb = document.getElementById('queryBtn');
                        if (qb) { qb.disabled = false; qb.textContent = '提交查询'; }
                    }
                    if (state.eventSource) {
                        state.eventSource.close();
                    }
                    break;
                    
                case 'error':
                    addLogEntry(agent_id || 'system', 'error', data.error);
                    {
                        const qb = document.getElementById('queryBtn');
                        if (qb) { qb.disabled = false; qb.textContent = '提交查询'; }
                    }
                    break;
            }
            
            addLogEntry(agent_id, event_type, JSON.stringify(data).slice(0, 100));
        }
        
        // 更新 Agent 状态
        function updateAgentStatus(agentId, status) {
            if (!agentId || !state.agents[agentId]) return;
            
            state.agents[agentId].status = status;
            const statusEl = document.getElementById(`status-${agentId}`);
            if (statusEl) {
                statusEl.className = `agent-status status-${status}`;
                statusEl.textContent = status;
            }
            
            updateMetrics();
        }
        
        // 更新思考内容
        function updateThinking(agentId, text) {
            if (!agentId) return;
            
            const panel = document.getElementById(`thinking-${agentId}`);
            const content = document.getElementById(`thinking-content-${agentId}`);
            
            if (panel && content) {
                panel.style.display = 'block';
                content.textContent += text;
            }
        }
        
        // 添加步骤
        function addStep(agentId, type, content, details = null) {
            if (!agentId) return;
            
            const stepsContainer = document.getElementById(`steps-${agentId}`);
            if (!stepsContainer) return;
            
            const stepEl = document.createElement('div');
            stepEl.className = `step-item ${type}`;
            
            let detailsHtml = '';
            if (details) {
                detailsHtml = `<div style="margin-top: 4px; color: #64748b; font-size: 11px;">${JSON.stringify(details)}</div>`;
            }
            
            stepEl.innerHTML = `
                <div class="step-type">${type}</div>
                <div class="step-content">${content}</div>
                ${detailsHtml}
            `;
            
            stepsContainer.appendChild(stepEl);
            stepsContainer.scrollTop = stepsContainer.scrollHeight;
            
            // 限制显示数量
            while (stepsContainer.children.length > 6) {
                stepsContainer.removeChild(stepsContainer.firstChild);
            }
        }
        
        // 更新 Token 使用
        function updateTokenUsage(agentId, cumulative) {
            if (!agentId) return;
            
            state.agents[agentId].tokens = cumulative;
            
            // 更新 Context Bar
            const ratio = Math.min(cumulative / 128000, 1);
            const bar = document.getElementById(`context-bar-${agentId}`);
            const value = document.getElementById(`context-value-${agentId}`);
            
            if (bar && value) {
                bar.style.width = `${ratio * 100}%`;
                value.textContent = `${(ratio * 100).toFixed(1)}%`;
                
                bar.className = 'context-bar normal';
                if (ratio >= 0.7) {
                    bar.className = 'context-bar warning';
                }
            }
            
            // 更新总 Token
            state.totalTokens = Math.max(state.totalTokens, cumulative);
            updateMetrics();
        }
        
        // 闪烁 Context Bar
        function flashContextBar(agentId) {
            if (!agentId) return;
            
            const bar = document.getElementById(`context-bar-${agentId}`);
            if (bar) {
                bar.className = 'context-bar compressed';
                setTimeout(() => {
                    bar.className = 'context-bar normal';
                }, 500);
            }
        }
        
        // 更新指标
        function updateMetrics() {
            document.getElementById('totalTokens').textContent = state.totalTokens.toLocaleString();
            document.getElementById('totalSteps').textContent = state.totalSteps;
            
            const activeCount = Object.values(state.agents).filter(a => a.status === 'running').length;
            document.getElementById('activeAgents').textContent = activeCount;
            
            if (state.startTime) {
                const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
                document.getElementById('elapsedTime').textContent = `${elapsed}s`;
            }
        }
        
        // 添加日志条目
        function addLogEntry(agentId, type, content) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            const agent = agentId || 'system';
            
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-agent">${agent}</span>
                <span class="log-type ${type}">${type}</span>
                <span class="log-content">${content}</span>
            `;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // 更新 Token 图表
        function updateTokenChart(agentId, iteration, cumulative) {
            if (!agentId) return;
            
            if (!state.tokenHistory[agentId]) {
                state.tokenHistory[agentId] = [];
            }
            
            state.tokenHistory[agentId].push({ iteration, cumulative });
            drawTokenChart();
        }
        
        // 绘制 Token 图表
        function drawTokenChart() {
            const canvas = document.getElementById('tokenChart');
            const ctx = canvas.getContext('2d');
            
            // 设置 canvas 尺寸
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const width = canvas.width;
            const height = canvas.height;
            const padding = 40;
            
            // 清空画布
            ctx.clearRect(0, 0, width, height);
            
            // 找出最大值
            let maxTokens = 0;
            let maxIteration = 0;
            Object.values(state.tokenHistory).forEach(history => {
                history.forEach(point => {
                    maxTokens = Math.max(maxTokens, point.cumulative);
                    maxIteration = Math.max(maxIteration, point.iteration);
                });
            });
            
            if (maxTokens === 0) return;
            
            // 绘制坐标轴
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
            
            // 绘制数据线
            Object.entries(state.tokenHistory).forEach(([agentId, history]) => {
                if (history.length === 0) return;
                
                ctx.strokeStyle = agentColors[agentId] || '#94a3b8';
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                history.forEach((point, i) => {
                    const x = padding + (point.iteration / Math.max(maxIteration, 1)) * (width - 2 * padding);
                    const y = height - padding - (point.cumulative / maxTokens) * (height - 2 * padding);
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                
                ctx.stroke();
            });
        }
        
        // 定时更新耗时
        setInterval(() => {
            if (state.startTime) {
                const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
                document.getElementById('elapsedTime').textContent = `${elapsed}s`;
            }
        }, 1000);
        
        // 初始化
        initAgentCards();
        initContextBars();
        
        // 窗口大小改变时重绘图表
        window.addEventListener('resize', drawTokenChart);
    </script>
</body>
</html>
